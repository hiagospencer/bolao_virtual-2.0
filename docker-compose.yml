version: '3.8'

services:

  redis:
    image: redis:7
    command: redis-server --requirepass emillylinda10
    restart: always

  celery:
    build: .
    command: celery -A bolao_virtual worker --loglevel=info
    restart: always
    volumes:
      - static:/static
    env_file:
      - .env
    depends_on:
      - redis


  web:
    build: .
    volumes:
      - .:/app
      - static:/app/staticfiles
    env_file: .env
    depends_on:
      - redis
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8000:80"
    volumes:
      - static:/staticfiles
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

volumes:
  static:
