<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bolão Virtual</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page login-page">
    <div class="auth-container">
        <div class="auth-header">
            <h1><i class="fas fa-trophy"></i> Bolão Virtual</h1>
            <p>Faça login para acessar sua conta</p>
        </div>

        <form class="auth-form">
            <div class="form-group">
                <label for="login-email"><i class="fas fa-envelope"></i> E-mail</label>
                <input type="email" id="login-email" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label for="login-password"><i class="fas fa-lock"></i> Senha</label>
                <div class="password-input">
                    <input type="password" id="login-password" placeholder="Sua senha" required>
                    <button type="button" class="toggle-password" aria-label="Mostrar senha">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="remember-me">
                    <span class="checkmark"></span>
                    Lembrar de mim
                </label>
                <a href="/recuperar-senha" class="forgot-password">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn btn-auth">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>

            <div class="auth-footer">
                <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
            </div>
        </form>

        <div class="social-login">
            <p>Ou entre com:</p>
            <div class="social-buttons">
                <button type="button" class="btn btn-social btn-google">
                    <i class="fab fa-google"></i> Google
                </button>
                <button type="button" class="btn btn-social btn-facebook">
                    <i class="fab fa-facebook-f"></i> Facebook
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
